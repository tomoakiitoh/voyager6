<!--
title: ページが見つかりません
description: お探しのページは見つかりませんでした。
-->
<script>
// 404 もダッシュボードに残す: パスに「404/」の印を付けて記録する。
// GoatCounter 上で「404/〜」を見れば、どのURLでリンク切れ・迷子が
// 起きているかが一覧できる(昔の httpd ログの 404 ハントの代わり)。
// このページは GitHub Pages が任意の存在しないURLで返すため、
// 参照はすべて絶対パスにしてある(ビルド側で root="/" を指定)。
window.goatcounter = { path: function(p) { return '404/' + p.replace(/^\//, ''); } };
</script>
<main class="doc">

<h1>ページが見つかりません</h1>

<p>
お探しのURLにページはありませんでした。
移動したか、はじめから存在しないかのどちらかです。
</p>

<p>
<a href="/">星座早見盤へ</a> /
<a href="/tonight/">今夜の空へ</a> /
<a href="/calendar/">天文カレンダーへ</a>
</p>

</main>
