<!--
title: VRプラネタリウム
description: 早見盤と同じ計算で、指定した日時・場所の星空を天球の内側に描く。中心に立って見上げるVR星空(Quest等のブラウザで没入)。星座線・惑星・時間送りつき。
scripts: astro.js data.js sites.js
bodyclass: planetarium-page
-->
<div id="pl-wrap"><canvas id="pl-canvas"></canvas></div>

<div id="pl-panel">
  <div class="row">
    <span id="pl-info" class="info"></span>
    <span class="grow"></span>
    <button id="pl-vr" hidden>VRで見る</button>
    <button id="pl-now" class="primary">今</button>
  </div>
  <div class="row">
    <label class="info">場所 <select id="pl-site"></select></label>
    <label class="info pl-cust" hidden>緯度 <input type="number" id="pl-lat" step="0.01" min="-90" max="90"></label>
    <label class="info pl-cust" hidden>経度 <input type="number" id="pl-lon" step="0.01" min="-180" max="180"></label>
    <input type="date" id="pl-date">
  </div>
  <div class="row">
    <button id="pl-play" title="時間送り (日周運動)">▶</button>
    <select id="pl-speed" title="速度">
      <option value="10">10分/秒</option>
      <option value="60" selected>1時間/秒</option>
      <option value="360">6時間/秒</option>
      <option value="1440">1日/秒</option>
    </select>
    <input type="range" id="pl-time" min="0" max="1439" step="1" value="0">
  </div>
  <div class="row toggles">
    <label><input type="checkbox" id="pl-lines" checked>星座線</label>
    <label><input type="checkbox" id="pl-names">星座名</label>
    <label><input type="checkbox" id="pl-planets" checked>惑星・月</label>
    <label><input type="checkbox" id="pl-mw" checked>天の川</label>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "../assets/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from "three";
// astro.js: raDecToVec / skyMatrix / applySky / skyMatrixNoPrecession / planetPosition /
//   moonPosition / moonTopocentric / sunPosition / julianDay / jdFromDate。data.js/sites.js。
// 星の方向は早見盤とまったく同じ (e,n,u)。VRでは (e, u, -n) 方向に置くだけ。

const R = 100;                 // 天球半径 (無限遠の代用。大きさは相対的なので任意)
const TZ_MIN = 9 * 60;         // JST
const el = (id) => document.getElementById(id);

// ---- シーン ----
const canvas = el("pl-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
renderer.xr.enabled = true;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03040a);
const camera = new THREE.PerspectiveCamera(72, 1, 0.1, R * 4);
camera.position.set(0, 1.6, 0);        // 中心に立つ (目の高さ)。VRでは頭が視点

// 天球グループ: 恒星・星座線・天の川を J2000 の向きで入れておき、
// このグループの行列を skyMatrix にすることで日時・場所ぶん一括で回す。
const skyGroup = new THREE.Group();
skyGroup.matrixAutoUpdate = false;
scene.add(skyGroup);

// B-V → おおよその星の色
function bvRGB(bv) {
  const A = [[-0.4, 0.61, 0.70, 1.0], [0.0, 0.79, 0.85, 1.0], [0.4, 1.0, 0.98, 0.94],
             [0.8, 1.0, 0.93, 0.80], [1.3, 1.0, 0.84, 0.67], [2.0, 1.0, 0.76, 0.60]];
  bv = Math.max(A[0][0], Math.min(A[A.length - 1][0], bv || 0));
  for (let i = 1; i < A.length; i++) {
    if (bv <= A[i][0]) {
      const t = (bv - A[i - 1][0]) / (A[i][0] - A[i - 1][0]);
      return [1, 2, 3].map((k) => A[i - 1][k] + t * (A[i][k] - A[i - 1][k]));
    }
  }
  return [1, 1, 1];
}

// ---- 恒星 (シェーダで等級ごとに大きさ、B-Vで色) ----
const STAR_VERT = `
attribute float aSize; attribute vec3 aColor; varying vec3 vColor;
void main(){ vColor=aColor; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); gl_PointSize=aSize; }`;
const STAR_FRAG = `
precision mediump float; varying vec3 vColor;
void main(){ vec2 d=gl_PointCoord-vec2(0.5); float r2=dot(d,d); if(r2>0.25) discard;
  gl_FragColor=vec4(vColor, smoothstep(0.25,0.02,r2)); }`;

{
  const n = STARS.length;
  const pos = new Float32Array(n * 3), col = new Float32Array(n * 3), siz = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const s = STARS[i];               // [ra, dec, mag, B-V]
    const v = raDecToVec(s[0], s[1]);
    pos[i * 3] = v[0] * R; pos[i * 3 + 1] = v[1] * R; pos[i * 3 + 2] = v[2] * R;
    const c = bvRGB(s[3]); col[i * 3] = c[0]; col[i * 3 + 1] = c[1]; col[i * 3 + 2] = c[2];
    siz[i] = Math.max(2.0, Math.min(15.0, (6.6 - s[2]) * 2.0));  // 明るいほど大きい
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  g.setAttribute("aColor", new THREE.BufferAttribute(col, 3));
  g.setAttribute("aSize", new THREE.BufferAttribute(siz, 1));
  const stars = new THREE.Points(g, new THREE.ShaderMaterial({
    vertexShader: STAR_VERT, fragmentShader: STAR_FRAG, transparent: true, depthWrite: false }));
  stars.frustumCulled = false;
  skyGroup.add(stars);
}

// ---- 星座線 ----
const constLines = (() => {
  const pts = [];
  for (const [, polylines] of CONST_LINES) {
    for (const line of polylines) {
      for (let i = 0; i + 1 < line.length; i++) {
        for (const p of [line[i], line[i + 1]]) {
          const v = raDecToVec(p[0], p[1]);
          pts.push(v[0] * R, v[1] * R, v[2] * R);
        }
      }
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pts), 3));
  const line = new THREE.LineSegments(g, new THREE.LineBasicMaterial({
    color: 0x2f4a78, transparent: true, opacity: 0.55 }));
  line.frustumCulled = false; skyGroup.add(line); return line;
})();

// ---- 天の川 (簡易: 等高線を淡い線で。phase2 で作り込み) ----
const milkyway = (() => {
  const pts = [];
  for (const level of MILKYWAY) for (const ring of level) {
    for (let i = 0; i + 1 < ring.length; i++) {
      for (const p of [ring[i], ring[i + 1]]) {
        const v = raDecToVec(p[0], p[1]); pts.push(v[0] * R, v[1] * R, v[2] * R);
      }
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array(pts), 3));
  const line = new THREE.LineSegments(g, new THREE.LineBasicMaterial({
    color: 0x1c2740, transparent: true, opacity: 0.5 }));
  line.frustumCulled = false; skyGroup.add(line); return line;
})();

// ---- 星座名スプライト ----
function makeLabel(text, color, size = 0.5) {
  const c = document.createElement("canvas"); c.width = 256; c.height = 64;
  const g = c.getContext("2d");
  g.font = "30px sans-serif"; g.fillStyle = color; g.textAlign = "center";
  g.textBaseline = "middle"; g.fillText(text, 128, 34);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: new THREE.CanvasTexture(c), transparent: true, depthTest: false, depthWrite: false }));
  sp.scale.set(size * 4, size, 1); return sp;
}
const constNames = new THREE.Group(); skyGroup.add(constNames);
for (const [ra, dec, name] of CONST_NAMES) {
  const v = raDecToVec(ra, dec);
  const sp = makeLabel(name, "#8aa0c8", R * 0.02);
  sp.position.set(v[0] * R * 0.98, v[1] * R * 0.98, v[2] * R * 0.98);
  constNames.add(sp);
}
constNames.visible = false;

// ---- 地面・地平線・方位 (観測者フレーム。天球と一緒には回さない) ----
const ground = new THREE.Mesh(new THREE.CircleGeometry(R * 2, 64),
  new THREE.MeshBasicMaterial({ color: 0x05070d, side: THREE.DoubleSide }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -0.4; scene.add(ground);

const horizon = new THREE.LineLoop(
  new THREE.BufferGeometry().setFromPoints(
    Array.from({ length: 128 }, (_, i) => {
      const a = i / 128 * Math.PI * 2; return new THREE.Vector3(Math.sin(a) * R, 0, -Math.cos(a) * R);
    })),
  new THREE.LineBasicMaterial({ color: 0x33507f, transparent: true, opacity: 0.6 }));
scene.add(horizon);

// 方位: 北=-z, 東=+x, 南=+z, 西=-x
for (const [name, x, z, color] of [["北", 0, -1, "#ff8a8a"], ["東", 1, 0, "#dfe8ff"],
  ["南", 0, 1, "#dfe8ff"], ["西", -1, 0, "#dfe8ff"]]) {
  const sp = makeLabel(name, color, R * 0.04);
  sp.position.set(x * R * 0.9, 1.5, z * R * 0.9); scene.add(sp);
}

// ---- 惑星・月・太陽 (観測者フレームに毎回置き直す) ----
const bodyDefs = [
  ["sun", "太陽", 0xffdf70, 3.0], ["moon", "月", 0xdfe6f0, 2.6],
  ["Mercury", "水星", 0xcfd3d8, 1.4], ["Venus", "金星", 0xfdf6e0, 2.2],
  ["Mars", "火星", 0xf0705a, 1.6], ["Jupiter", "木星", 0xf5e6bf, 2.0],
  ["Saturn", "土星", 0xe9d27a, 1.8],
];
const bodyGroup = new THREE.Group(); scene.add(bodyGroup);
const bodies = bodyDefs.map(([id, ja, color, mag]) => {
  // 太陽・月は約0.5°の円盤、惑星は小さめの点。R*0.0016*mag ≈ 見かけの大きさの目安
  const m = new THREE.Mesh(new THREE.SphereGeometry(R * 0.0016 * mag, 16, 16),
    new THREE.MeshBasicMaterial({ color }));
  const label = makeLabel(ja, "#" + color.toString(16).padStart(6, "0"), R * 0.03);
  const grp = new THREE.Group(); grp.add(m); grp.add(label);
  label.position.y = R * 0.03; bodyGroup.add(grp);
  return { id, grp };
});

// ---- 状態と更新 ----
let site = loadSite();
let curJd = jdFromDate(new Date());

// (e,n,u) 行列 M → three の回転 A·M ([e→x, u→y, -n→z])
function setSkyMatrix(M) {
  const m = new THREE.Matrix4();
  m.set(M[0][0], M[0][1], M[0][2], 0,
        M[2][0], M[2][1], M[2][2], 0,
        -M[1][0], -M[1][1], -M[1][2], 0,
        0, 0, 0, 1);
  skyGroup.matrix.copy(m);
}
const toDir = (h) => new THREE.Vector3(h.e, h.u, -h.n);   // 地平成分 → three 方向

function update() {
  const M = skyMatrix(curJd, site.lat, site.lon);
  setSkyMatrix(M);
  const Mn = skyMatrixNoPrecession(curJd, site.lat, site.lon);
  // 惑星・月・太陽
  for (const b of bodies) {
    let rd;
    if (b.id === "sun") rd = sunPosition(curJd);
    else if (b.id === "moon") rd = moonTopocentric(moonPosition(curJd), curJd, site.lat, site.lon);
    else rd = planetPosition(b.id, curJd);
    const h = applySky(Mn, raDecToVec(rd.ra, rd.dec));
    b.grp.visible = h.u > -0.05;                 // 地平線下は隠す
    b.grp.position.copy(toDir(h).multiplyScalar(R * 0.96));
  }
  // 日時表示
  const d = new Date((curJd - 2440587.5) * 86400000 + TZ_MIN * 60000);
  const p2 = (n) => String(n).padStart(2, "0");
  el("pl-info").textContent =
    `${site.name}　${d.getUTCFullYear()}-${p2(d.getUTCMonth() + 1)}-${p2(d.getUTCDate())} ${p2(d.getUTCHours())}:${p2(d.getUTCMinutes())} JST`;
}

// ---- 日時コントロール ----
function syncControls() {
  const d = new Date((curJd - 2440587.5) * 86400000 + TZ_MIN * 60000);
  const p2 = (n) => String(n).padStart(2, "0");
  el("pl-date").value = `${d.getUTCFullYear()}-${p2(d.getUTCMonth() + 1)}-${p2(d.getUTCDate())}`;
  el("pl-time").value = d.getUTCHours() * 60 + d.getUTCMinutes();
}
function jdFromControls() {
  const [y, m, dd] = el("pl-date").value.split("-").map(Number);
  const min = Number(el("pl-time").value);
  return julianDay(y, m, dd, min / 60 - 9);      // JST → UT
}
el("pl-date").addEventListener("change", () => { curJd = jdFromControls(); update(); });
el("pl-time").addEventListener("input", () => { curJd = jdFromControls(); update(); });
el("pl-now").addEventListener("click", () => { curJd = jdFromDate(new Date()); syncControls(); update(); });

el("pl-lines").addEventListener("change", () => constLines.visible = el("pl-lines").checked);
el("pl-names").addEventListener("change", () => constNames.visible = el("pl-names").checked);
el("pl-planets").addEventListener("change", () => bodyGroup.visible = el("pl-planets").checked);
el("pl-mw").addEventListener("change", () => milkyway.visible = el("pl-mw").checked);

// 観測地
fillSiteSelect(el("pl-site"), site);
el("pl-site").addEventListener("change", () => {
  const v = el("pl-site").value;
  const cust = v === "custom";
  for (const e of document.querySelectorAll(".pl-cust")) e.hidden = !cust;
  if (!cust) {
    const [lat, lon] = v.split(",").map(Number);
    const name = el("pl-site").selectedOptions[0].textContent;
    site = { name, lat, lon }; saveSite(site); update();
  }
});
for (const id of ["pl-lat", "pl-lon"]) el(id).addEventListener("change", () => {
  site = { name: "現在地", lat: Number(el("pl-lat").value), lon: Number(el("pl-lon").value) };
  el("pl-lat").value = site.lat; el("pl-lon").value = site.lon; saveSite(site); update();
});

// ---- 再生 (時間送り = 日周運動) ----
let playing = false, lastT = 0;
el("pl-play").addEventListener("click", () => {
  playing = !playing; el("pl-play").textContent = playing ? "■" : "▶"; lastT = 0;
});

// ---- デスクトップの見回し (VRでは頭が視点) ----
let yaw = Math.PI, pitch = 0.35, dragging = false, px = 0, py = 0;   // 初期=南を見上げる
canvas.addEventListener("pointerdown", (e) => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener("pointerup", () => dragging = false);
addEventListener("pointermove", (e) => {
  if (!dragging || renderer.xr.isPresenting) return;
  yaw -= (e.clientX - px) * 0.004; pitch -= (e.clientY - py) * 0.004;
  pitch = Math.max(-1.45, Math.min(1.45, pitch)); px = e.clientX; py = e.clientY;
});

// ---- 描画ループ ----
function resize() {
  if (renderer.xr.isPresenting) return;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
  }
}
function tick(now) {
  resize();
  if (playing) {
    const dt = lastT ? (now - lastT) / 1000 : 0; lastT = now;
    curJd += (Number(el("pl-speed").value) / 1440) * dt;   // 分/秒 → 日
    syncControls(); update();
  }
  if (!renderer.xr.isPresenting) {
    camera.rotation.set(pitch, yaw, 0, "YXZ");
    camera.position.set(0, 1.6, 0);
  }
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(tick);

syncControls();
update();

// ---- VRモード (WebXR: 天球の中心に立って見上げる) ----
setupVR();
function setupVR() {
  const btn = el("pl-vr");
  if (!navigator.xr) return;
  navigator.xr.isSessionSupported("immersive-vr").then((ok) => {
    if (!ok) return;
    btn.hidden = false;
    let session = null;
    btn.addEventListener("click", async () => {
      if (session) { session.end(); return; }
      try {
        session = await navigator.xr.requestSession("immersive-vr", { optionalFeatures: ["local-floor"] });
      } catch (e) { alert("VRを開始できませんでした。Quest のブラウザで開いてください。"); return; }
      renderer.xr.setReferenceSpaceType("local-floor");  // 立って見上げる=床基準
      await renderer.xr.setSession(session);
      btn.textContent = "VRを終了";
      session.addEventListener("end", () => { session = null; btn.textContent = "VRで見る"; });
    });
  });
}
</script>

<style>
  #pl-wrap { flex: 1 1 auto; min-height: 0; position: relative; }
  #pl-canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
  #pl-canvas:active { cursor: grabbing; }
  #pl-panel {
    flex: 0 0 auto; background: var(--panel); border-top: 1px solid var(--line);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); font-size: 13px;
  }
  .planetarium-page #site-footer { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #pl-panel .toggles { display: flex; flex-wrap: wrap; gap: 6px; }
  #pl-panel .toggles label {
    border: 1px solid var(--line); border-radius: 6px; padding: 5px 10px; cursor: pointer; user-select: none;
  }
  #pl-panel .toggles input { accent-color: var(--accent); margin: 0 4px 0 0; }
  #pl-panel .toggles label:has(input:checked) { color: var(--fg); border-color: #35589c; background: #17233f; }
</style>
