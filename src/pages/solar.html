description: 彗星と惑星の軌道を3Dで見る太陽系ビュー。時間を動かして彗星がどこを回っているかを俯瞰する。

bodyclass: solar-page

<div id="solar-wrap"><canvas id="solar-canvas"></canvas></div>

<div id="solar-panel">
  <div class="row">
    <span id="solar-date" class="info"></span>
    <span class="grow"></span>
    <button id="solar-now" class="primary">今</button>
  </div>
  <div class="row">
    <input type="range" id="solar-time" min="-18262" max="18262" step="1" value="0">
  </div>
  <div class="row">
    <button id="solar-play" title="再生 / 停止">▶</button>
    <select id="solar-speed" title="再生速度">
      <option value="5">5日/秒</option>
      <option value="30" selected>30日/秒</option>
      <option value="120">120日/秒</option>
      <option value="600">600日/秒</option>
    </select>
    <label class="info">彗星群
      <select id="comet-group">
        <option value="all">すべて</option>
        <option value="jfc">木星族</option>
        <option value="halley">ハレー型</option>
        <option value="lp">長周期</option>
        <option value="hyp">双曲線・恒星間</option>
        <option value="sungrazer">太陽をかすめる群</option>
        <option value="kreutz">クロイツ群</option>
      </select></label>
    <input type="text" id="comet-search" placeholder="彗星名で選択" maxlength="30">
    <button id="comet-search-btn">選択</button>
  </div>
  <div class="row toggles">
    <label><input type="checkbox" id="solar-orbits" checked>惑星軌道</label>
    <label><input type="checkbox" id="solar-comets" checked>彗星</label>
    <label><input type="checkbox" id="solar-comet-orbits">全彗星の軌道線</label>
    <label><input type="checkbox" id="solar-asteroids">小惑星</label>
    <label><input type="checkbox" id="solar-asteroids2">全量 (GPU)</label>
    <label><input type="checkbox" id="solar-corotate">木星固定（回転座標系）</label>
    <label><input type="checkbox" id="solar-names" checked>惑星名</label>
  </div>
  <div class="row"><span id="solar-pick" class="info"></span></div>
</div>

<script type="importmap">
{ "imports": { "three": "../assets/three.module.min.js" } }
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "../assets/OrbitControls.js";

// astro.js のグローバル (orbitPosition / heliocentric / PLANET_ELEMENTS / sunEclipticJ2000 /
// julianDay / jdFromDate / schlyterDay / DEG) をそのまま使う。位置計算は望遠鏡モード(F3/F4)と
// 同じで、Horizons と Vesta 4.6″/彗星 0.26′ 一致を確認済みのもの。

const AU = 1;                       // 1 天文単位 = three.js の 1 単位
const TZ_MIN = 9 * 60;              // JST
const J0 = julianDay(2000, 1, 1, 12); // 基準 (スライダー 0 = J2000)

// 黄道直交 (x,y,z) → three.js (黄道面を水平・北黄極を上に)
const toV = (h) => new THREE.Vector3(h.x, h.z, -h.y);

// ---- シーン ----
const canvas = document.getElementById("solar-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070d);
const camera = new THREE.PerspectiveCamera(50, 1, 0.005, 8000);
camera.position.set(0, 22, 42); // 海王星軌道(30AU)まで見える俯瞰。ズームで内側へ
const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// 太陽
const sun = new THREE.Mesh(
  new THREE.SphereGeometry(0.28, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xffdf70 }));
scene.add(sun);
scene.add(new THREE.PointLight(0xffffff, 1.4, 0, 0));
scene.add(new THREE.AmbientLight(0x668, 0.6));

// 黄道面のうっすらグリッド (向きの手がかり)
const grid = new THREE.PolarGridHelper(45, 8, 9, 64, 0x223, 0x18213a);
scene.add(grid);

// 公転する天体はすべてこのグループに入れる。回転座標系(木星固定)では
// このグループごと木星の黄経ぶん回すことで、木星を止めて見せる。
const orbitingGroup = new THREE.Group();
scene.add(orbitingGroup);
let coRotating = false;

// ---- 惑星 ----
const PLANETS = [
  ["Mercury", 0xcfd3d8, "水星", 0.05],
  ["Venus", 0xfdf6e0, "金星", 0.08],
  ["Earth", 0x6b93d6, "地球", 0.085],
  ["Mars", 0xf0705a, "火星", 0.06],
  ["Jupiter", 0xf5e6bf, "木星", 0.16],
  ["Saturn", 0xe9d27a, "土星", 0.14],
  ["Uranus", 0xa8e0e6, "天王星", 0.11],
  ["Neptune", 0x4b70dd, "海王星", 0.11],
  ["Pluto", 0xc9b8a8, "冥王星", 0.04],
];
const planetMeshes = [], planetLabels = [], orbitLines = [];

/** 惑星の日心位置 (地球は太陽の地心位置の逆)。 */
function planetHelio(name, jd) {
  if (name === "Earth") {
    const s = sunEclipticJ2000(jd);
    return { x: -s.x, y: -s.y, z: -s.z };
  }
  return heliocentric(PLANET_ELEMENTS[name](schlyterDay(jd)));
}

for (const [name, color, ja, size] of PLANETS) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(size, 16, 16),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.25 }));
  orbitingGroup.add(m); planetMeshes.push({ name, mesh: m });

  // 軌道線 (M を一周させてサンプル)
  const pts = [];
  for (let deg = 0; deg <= 360; deg += 3) {
    let h;
    if (name === "Earth") {
      const s = sunEclipticJ2000(J0 + deg / 360 * 365.25);
      h = { x: -s.x, y: -s.y, z: -s.z };
    } else {
      h = heliocentric({ ...PLANET_ELEMENTS[name](schlyterDay(J0)), M: deg });
    }
    pts.push(toV(h));
  }
  const line = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.28 }));
  orbitingGroup.add(line); orbitLines.push(line);

  // ラベル (スプライト)
  const label = makeLabel(ja, color);
  orbitingGroup.add(label); planetLabels.push(label);
}

/** 文字スプライトを作る。 */
function makeLabel(text, color) {
  const c = document.createElement("canvas");
  const s = 128; c.width = 256; c.height = 64;
  const g = c.getContext("2d");
  g.font = "28px sans-serif"; g.fillStyle = "#" + color.toString(16).padStart(6, "0");
  g.textBaseline = "middle"; g.fillText(text, 6, 34);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
  sp.scale.set(1.6, 0.4, 1);
  return sp;
}

// ---- 彗星 ----
let comets = null;                  // [[name,e,q,i,node,peri,tp,M1,K1], ...]
let cometGroup = [];                // 各彗星の力学群 (kreutz/sungrazer/jfc/halley/lp/hyp)
let cometPoints = null;             // THREE.Points (全彗星の現在位置)
let cometOrbitGroup = new THREE.Group(); orbitingGroup.add(cometOrbitGroup);
let activeGroup = "all";            // 群フィルタ (all=全部表示)

// 群ごとの色 (RGB 0-1)
const GROUP_COLOR = {
  kreutz: [1.0, 0.40, 0.40], sungrazer: [1.0, 0.66, 0.30], jfc: [0.55, 1.0, 0.80],
  halley: [0.80, 0.62, 1.0], lp: [0.60, 0.78, 1.0], hyp: [0.95, 0.95, 0.60],
};

/** 力学群の判定。クロイツ群は微小近日点＋特徴的な i・ω で見分ける。 */
function classifyComet(e, q, i, w) {
  if (q < 0.03 && i > 130 && i < 155 && w > 55 && w < 95) return "kreutz";
  if (q < 0.05) return "sungrazer";
  if (e > 1.02) return "hyp";
  if (e < 0.98) {
    const a = q / (1 - e);
    if (a > 0 && a < 40) {
      const Tj = 5.2028 / a + 2 * Math.cos(i * DEG) * Math.sqrt(a / 5.2028 * (1 - e * e));
      if (Tj > 2 && Tj < 3) return "jfc";
      if (Tj < 2) return "halley";
    }
  }
  return "lp";
}

fetch("../comets_all.json").then((r) => r.json()).then((d) => {
  comets = d;
  const geo = new THREE.BufferGeometry();
  const col = new Float32Array(d.length * 3);
  cometGroup = d.map((c, i) => {
    const g = classifyComet(c[1], c[2], c[3], c[5]);
    const rgb = GROUP_COLOR[g];
    col[i * 3] = rgb[0]; col[i * 3 + 1] = rgb[1]; col[i * 3 + 2] = rgb[2];
    return g;
  });
  geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(d.length * 3), 3));
  geo.setAttribute("color", new THREE.BufferAttribute(col, 3));
  cometPoints = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 3.4, sizeAttenuation: false, transparent: true, opacity: 0.95, vertexColors: true,
  }));
  orbitingGroup.add(cometPoints);
  buildCometOrbits();
  update();
  selectFromUrl();   // 彗星カタログから ?comet=符号 で来たら選択・追尾
}).catch(() => {});

// 符号を照合キーに正規化 (build_comets.py / comets ページと同じ規則)
function desigKeyOf(s) {
  s = s.trim();
  let m = s.match(/^(\d+[PDI])\b/);
  if (m) return m[1];
  m = s.match(/^([CPXAI]\/\d{4}\s+[A-Z]{1,2}\d*(?:-[A-Z])?)/);
  if (m) return m[1].replace(/\s+/g, " ");
  return s.split(" (")[0].trim();
}

// URL の ?comet=<符号キー> に一致する彗星を選ぶ (彗星カタログ /comets/ からの導線)
function selectFromUrl() {
  const key = new URLSearchParams(location.search).get("comet");
  if (!key || !comets) return;
  const kl = key.toLowerCase();
  let idx = comets.findIndex((c) => desigKeyOf(c[0]).toLowerCase() === kl);
  if (idx < 0) idx = comets.findIndex((c) => c[0].toLowerCase().includes(kl));
  if (idx >= 0) selectComet(idx);
}

/** 近日点が内惑星系に届く彗星の軌道線 (数が多いので q<8AU に絞る)。 */
function buildCometOrbits() {
  for (const c of comets) {
    const q = c[2];
    if (q > 8) continue;
    const el = { e: c[1], q, i: c[3], node: c[4], peri: c[5], tp: c[6] };
    const pts = [];
    // 楕円は一周、放物線/双曲線は近日点前後だけ描く
    const span = el.e < 0.98 ? [0, 360] : [-160, 160];
    for (let f = span[0]; f <= span[1]; f += 4) {
      const h = orbitAtTrueAnomaly(el, f);
      if (h) pts.push(toV(h));
    }
    if (pts.length < 2) continue;
    const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0x3a7d6a, transparent: true, opacity: 0.35 }));
    line.visible = false;
    cometOrbitGroup.add(line);
  }
}

/** 真近点角 f [度] での日心位置 (軌道線用。時刻に依らず形だけ描く)。 */
function orbitAtTrueAnomaly(el, f) {
  const e = el.e, q = el.q;
  const denom = 1 + e * Math.cos(f * DEG);
  if (denom <= 1e-4) return null;               // 双曲線の漸近方向
  const r = q * (1 + e) / denom;                // r = p/(1+e cos f), p = q(1+e)
  const u = (f + el.peri) * DEG, N = el.node * DEG, i = el.i * DEG;
  return {
    x: r * (Math.cos(N) * Math.cos(u) - Math.sin(N) * Math.sin(u) * Math.cos(i)),
    y: r * (Math.sin(N) * Math.cos(u) + Math.cos(N) * Math.sin(u) * Math.cos(i)),
    z: r * Math.sin(u) * Math.sin(i),
  };
}

// ---- 小惑星 (H≤12 の大きめ小惑星でメインベルトを描く) ----
let asteroids = null, asteroidPoints = null, asteroidsTried = false;

function loadAsteroids() {
  if (asteroidsTried) return;
  asteroidsTried = true;
  fetch("../asteroids_solar.json").then((r) => r.json()).then((d) => {
    asteroids = d;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(d.length * 3), 3));
    asteroidPoints = new THREE.Points(geo, new THREE.PointsMaterial({
      color: 0xb9a67e, size: 1.6, sizeAttenuation: false, transparent: true, opacity: 0.7,
    }));
    orbitingGroup.add(asteroidPoints);
    update();
  }).catch(() => { /* 無くても動く */ });
}

/** 小惑星の日心位置 (楕円・M0+epoch)。a=[a,e,i,Ω,ω,M0,epoch,H]。 */
function asteroidHelio(a, jd) {
  const n = 0.9856076686 / Math.pow(a[0], 1.5);
  const M = a[5] + n * (jd - a[6]);
  return heliocentric({ N: a[3], i: a[2], w: a[4], a: a[0], e: a[1], M });
}

// ---- 特定の小惑星を軌道つきで表示 (小惑星カタログ /asteroids/ からの ?ael= 導線) ----
let selAst = null;                          // { el:[a,e,i,Ω,ω,M0,epoch], name }
let selAstOrbit = null;
const selAstMarker = new THREE.Mesh(new THREE.SphereGeometry(0.06, 14, 14),
  new THREE.MeshBasicMaterial({ color: 0x9fffe0, wireframe: true, transparent: true, opacity: 0.95 }));
selAstMarker.visible = false; orbitingGroup.add(selAstMarker);

function showAsteroid(el, name) {
  selAst = { el, name };
  if (selAstOrbit) { orbitingGroup.remove(selAstOrbit); selAstOrbit.geometry.dispose(); }
  const pts = [];  // M を一周させて軌道を描く (形は時刻に依らない)
  for (let M = 0; M <= 360; M += 2) {
    pts.push(toV(heliocentric({ N: el[3], i: el[2], w: el[4], a: el[0], e: el[1], M })));
  }
  selAstOrbit = new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x2fd6a6 }));
  orbitingGroup.add(selAstOrbit);
  selAstMarker.visible = true;
  updateAsteroidMarker(curJd);
}

function updateAsteroidMarker(jd) {
  if (!selAst) return;
  const h = asteroidHelio(selAst.el, jd);
  selAstMarker.position.set(h.x, h.z, -h.y);
  const r = Math.hypot(h.x, h.y, h.z);
  el("solar-pick").textContent = `★ ${selAst.name}　日心 ${r.toFixed(3)} AU`;
}

// URL の ?ael=a,e,i,Ω,ω,M0,epoch &aname=名前 で小惑星を軌道つき表示
function showAsteroidFromUrl() {
  const p = new URLSearchParams(location.search);
  const ael = p.get("ael");
  if (!ael) return;
  const elems = ael.split(",").map(Number);
  if (elems.length < 7 || elems.some((x) => !isFinite(x))) return;
  showAsteroid(elems, p.get("aname") || "小惑星");
}

// ---- 小惑星 Tier2 (H≤15 を GPU で全量描画。位置は頂点シェーダで都度ケプラーを解く) ----
// asteroids_tier2.bin: 1件 = 7×float32 [a, e, i, Ω, ω, M0, epochRel(=epoch−J2000)]。
// 頂点シェーダは CPU 版 asteroidHelio と同じ式 (Schlyter/heliocentric) をラジアンで解く。
// 点群を orbitingGroup に載せるので、回転座標系(木星固定)もカメラも自動で効く。
let tier2Points = null, tier2Mat = null, tier2Tried = false;

const TIER2_VERT = `
uniform float uT;      // curJd − J2000 [日]
uniform float uSize;   // 点の大きさ [px]
attribute vec4 orbA;   // a, e, i(deg), Ω node(deg)
attribute vec3 orbB;   // ω peri(deg), M0(deg), epochRel(日)
varying vec3 vCol;
const float DEG = 0.017453292519943295;
const float TAU = 6.283185307179586;
void main() {
  float a = orbA.x, e = orbA.y;
  float inc = orbA.z * DEG, node = orbA.w * DEG, peri = orbB.x * DEG;
  float nDeg = 0.9856076686 / pow(a, 1.5);          // 平均日運動 [deg/日]
  float M = mod((orbB.y + nDeg * (uT - orbB.z)) * DEG, TAU);
  float E = M + e * sin(M);                          // ケプラー方程式 (Newton)
  for (int k = 0; k < 6; k++) { E -= (E - e * sin(E) - M) / (1.0 - e * cos(E)); }
  float xv = a * (cos(E) - e);
  float yv = a * sqrt(1.0 - e * e) * sin(E);
  float v = atan(yv, xv);
  float r = length(vec2(xv, yv));
  float u = v + peri;
  float cN = cos(node), sN = sin(node), cu = cos(u), su = sin(u), ci = cos(inc), si = sin(inc);
  float x = r * (cN * cu - sN * su * ci);
  float y = r * (sN * cu + cN * su * ci);
  float z = r * su * si;
  vec3 pos = vec3(x, z, -y);                         // 黄道直交 → three (toV と同じ)
  vec3 c = vec3(0.72, 0.65, 0.49);                   // メインベルト (砂色)
  if (a > 5.0 && a < 5.4) c = vec3(0.55, 1.0, 0.80);            // トロヤ群 (緑)
  else if (a > 3.9 && a < 4.02 && e < 0.30) c = vec3(1.0, 0.72, 0.35); // ヒルダ群 (橙)
  vCol = c;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  gl_PointSize = uSize;
}`;

const TIER2_FRAG = `
precision mediump float;
varying vec3 vCol;
void main() {
  vec2 d = gl_PointCoord - vec2(0.5);
  if (dot(d, d) > 0.25) discard;                     // 丸い点にする
  gl_FragColor = vec4(vCol, 0.85);
}`;

function loadAsteroidsTier2() {
  if (tier2Tried) return;
  tier2Tried = true;
  fetch("../asteroids_tier2.bin").then((r) => r.arrayBuffer()).then((buf) => {
    const arr = new Float32Array(buf);            // [a,e,i,Ω,ω,M0,epochRel] × N
    const ib = new THREE.InterleavedBuffer(arr, 7);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute("orbA", new THREE.InterleavedBufferAttribute(ib, 4, 0));
    geo.setAttribute("orbB", new THREE.InterleavedBufferAttribute(ib, 3, 4));
    // position は頂点シェーダで上書きするが three が頂点数を得るために要る (ダミー)
    geo.setAttribute("position", new THREE.InterleavedBufferAttribute(ib, 3, 0));
    tier2Mat = new THREE.ShaderMaterial({
      uniforms: {
        uT: { value: curJd - J0 },
        uSize: { value: 1.5 * Math.min(2, window.devicePixelRatio || 1) },
      },
      vertexShader: TIER2_VERT, fragmentShader: TIER2_FRAG, transparent: true,
    });
    tier2Points = new THREE.Points(geo, tier2Mat);
    tier2Points.frustumCulled = false;            // ダミー position でのカリングを止める
    tier2Points.visible = el("solar-asteroids2").checked;
    orbitingGroup.add(tier2Points);
  }).catch(() => { /* 無くても動く */ });
}

// ---- 時間と更新 ----
let curJd = jdFromDate(new Date());

function update() {
  const jd = curJd;
  sun.position.set(0, 0, 0);
  for (let i = 0; i < PLANETS.length; i++) {
    const v = toV(planetHelio(PLANETS[i][0], jd));
    planetMeshes[i].mesh.position.copy(v);
    planetLabels[i].position.copy(v).add(new THREE.Vector3(0, PLANETS[i][3] + 0.15, 0));
  }
  if (cometPoints && comets) {
    const pos = cometPoints.geometry.getAttribute("position");
    for (let i = 0; i < comets.length; i++) {
      if (activeGroup !== "all" && cometGroup[i] !== activeGroup) {
        pos.setXYZ(i, 0, 0, 0); continue; // 群フィルタで隠す (太陽の中に畳む)
      }
      const c = comets[i];
      const h = orbitPosition({ e: c[1], q: c[2], i: c[3], node: c[4], peri: c[5], tp: c[6] }, jd);
      pos.setXYZ(i, h.x, h.z, -h.y);
    }
    pos.needsUpdate = true;
  }
  if (asteroidPoints && asteroidPoints.visible && asteroids) {
    const pos = asteroidPoints.geometry.getAttribute("position");
    for (let i = 0; i < asteroids.length; i++) {
      const h = asteroidHelio(asteroids[i], jd);
      pos.setXYZ(i, h.x, h.z, -h.y);
    }
    pos.needsUpdate = true;
  }
  if (selectedIndex >= 0) updateSelectedMarker(jd);
  if (selAst) updateAsteroidMarker(jd);
  if (tier2Mat) tier2Mat.uniforms.uT.value = jd - J0; // GPU全量: 時刻を渡す (位置はシェーダが計算)
  // 回転座標系: グループごと木星の黄経ぶん逆回転させて木星を固定 (トロヤ群/ヒルダ群が浮かぶ)
  orbitingGroup.rotation.y = coRotating
    ? -Math.atan2(heliocentric(PLANET_ELEMENTS.Jupiter(schlyterDay(jd))).y,
                  heliocentric(PLANET_ELEMENTS.Jupiter(schlyterDay(jd))).x)
    : 0;
  const d = new Date((jd - 2440587.5) * 86400000 + TZ_MIN * 60000);
  document.getElementById("solar-date").textContent =
    `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")} JST`;
}

const el = (id) => document.getElementById(id);
el("solar-time").addEventListener("input", () => {
  curJd = J0 + Number(el("solar-time").value);
  update();
});
el("solar-now").addEventListener("click", () => {
  curJd = jdFromDate(new Date());
  el("solar-time").value = Math.round(curJd - J0);
  update();
});
el("solar-orbits").addEventListener("change", () => orbitLines.forEach((l) => (l.visible = el("solar-orbits").checked)));
el("solar-names").addEventListener("change", () => planetLabels.forEach((l) => (l.visible = el("solar-names").checked)));
el("solar-comets").addEventListener("change", () => { if (cometPoints) cometPoints.visible = el("solar-comets").checked; });
el("solar-comet-orbits").addEventListener("change", () =>
  cometOrbitGroup.children.forEach((l) => (l.visible = el("solar-comet-orbits").checked)));
el("solar-asteroids").addEventListener("change", () => {
  const on = el("solar-asteroids").checked;
  if (on && !asteroidPoints) loadAsteroids();
  if (asteroidPoints) asteroidPoints.visible = on;
});
el("solar-asteroids2").addEventListener("change", () => {
  const on = el("solar-asteroids2").checked;
  if (on && !tier2Points) loadAsteroidsTier2();
  if (tier2Points) tier2Points.visible = on;
});
el("solar-corotate").addEventListener("change", () => {
  coRotating = el("solar-corotate").checked;
  update();
});

// 群フィルタ
el("comet-group").addEventListener("change", () => { activeGroup = el("comet-group").value; update(); });

// 彗星名で検索して選択
function searchComet() {
  if (!comets) return;
  const q = el("comet-search").value.trim().toLowerCase();
  if (!q) return;
  const idx = comets.findIndex((c) => c[0].toLowerCase().includes(q));
  if (idx < 0) { el("solar-pick").textContent = "見つかりません"; return; }
  selectComet(idx);
}
el("comet-search-btn").addEventListener("click", searchComet);
el("comet-search").addEventListener("keydown", (e) => { if (e.key === "Enter") searchComet(); });

// 再生 (時間を進めて彗星の動きを見る)
let playing = false, lastT = 0;
el("solar-play").addEventListener("click", () => {
  playing = !playing; el("solar-play").textContent = playing ? "■" : "▶"; lastT = 0;
});

// 初期スライダー位置
el("solar-time").value = Math.round(curJd - J0);

// ---- 彗星の選択 (軌道線＋強調マーカー＋追尾情報) ----
let selectedIndex = -1;
let selectedOrbitLine = null;
const selMarker = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 14),
  new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.9 }));
selMarker.visible = false; orbitingGroup.add(selMarker);

const elOf = (c) => ({ e: c[1], q: c[2], i: c[3], node: c[4], peri: c[5], tp: c[6] });

function selectComet(idx) {
  selectedIndex = idx;
  if (selectedOrbitLine) { orbitingGroup.remove(selectedOrbitLine); selectedOrbitLine.geometry.dispose(); selectedOrbitLine = null; }
  if (idx < 0) { selMarker.visible = false; el("solar-pick").textContent = ""; return; }
  const e2 = elOf(comets[idx]);
  const pts = [], span = e2.e < 0.98 ? [0, 360] : [-170, 170];
  for (let f = span[0]; f <= span[1]; f += 2) { const h = orbitAtTrueAnomaly(e2, f); if (h) pts.push(toV(h)); }
  if (pts.length > 1) {
    selectedOrbitLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color: 0xffe066 }));
    orbitingGroup.add(selectedOrbitLine);
  }
  selMarker.visible = true;
  updateSelectedMarker(curJd);
}

function updateSelectedMarker(jd) {
  const c = comets[selectedIndex];
  const h = orbitPosition(elOf(c), jd);
  selMarker.position.set(h.x, h.z, -h.y);
  const g = orbitalToRaDec(elOf(c), jd);
  const mag = cometMagnitude(c[7], c[8], g.r, g.delta);
  el("solar-pick").textContent =
    `★ ${c[0]}　日心 ${g.r.toFixed(2)} AU / 地心 ${g.delta.toFixed(2)} AU / 約${mag.toFixed(1)}等`;
}

// ---- 彗星クリックで選択 ----
canvas.addEventListener("click", (ev) => {
  if (!cometPoints || !comets || !cometPoints.visible) return;
  const rect = canvas.getBoundingClientRect();
  const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
  const pos = cometPoints.geometry.getAttribute("position");
  const v = new THREE.Vector3();
  let best = -1, bestD = 14 * 14; // 14px 以内で最近傍
  for (let i = 0; i < comets.length; i++) {
    if (activeGroup !== "all" && cometGroup[i] !== activeGroup) continue; // 隠れている彗星は拾わない
    v.set(pos.getX(i), pos.getY(i), pos.getZ(i)).project(camera);
    if (v.z > 1) continue;
    const sx = (v.x * 0.5 + 0.5) * rect.width, sy = (-v.y * 0.5 + 0.5) * rect.height;
    const d = (sx - mx) ** 2 + (sy - my) ** 2;
    if (d < bestD) { bestD = d; best = i; }
  }
  if (best >= 0) selectComet(best);
});

// ---- 描画ループ・リサイズ ----
function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  if (canvas.width !== w || canvas.height !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  }
}
function tick(now) {
  resize();
  if (playing) {
    const dt = lastT ? (now - lastT) / 1000 : 0; lastT = now;
    let val = (curJd - J0) + dt * Number(el("solar-speed").value);
    if (val > 18262 || val < -18262) {
      val = Math.max(-18262, Math.min(18262, val));
      playing = false; el("solar-play").textContent = "▶";
    }
    curJd = J0 + val;
    el("solar-time").value = Math.round(val);
    update();
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
showAsteroidFromUrl();  // ?ael= で小惑星を軌道つき表示 (彗星は fetch 後に selectFromUrl)
update();
tick();
</script>
